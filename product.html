<style>

*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
header{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hdr{max-width:1300px;margin:0 auto;padding:0 20px;height:65px;display:flex;align-items:center;gap:14px}
.logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#ff6600,#ff9900);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer}
.back-btn{color:var(--text2);font-size:0.9rem;cursor:pointer;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;gap:8px;transition:all .2s}
.back-btn:hover{color:var(--primary);border-color:var(--primary)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.cur-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:0.85rem;outline:none;font-family:'Inter',sans-serif}
.cart-btn{background:var(--primary);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:0.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .2s}
.cart-btn:hover{background:var(--primary-dark)}
.cart-count{background:#fff;color:var(--primary);border-radius:50%;width:19px;height:19px;font-size:0.7rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.breadcrumb{max-width:1300px;margin:16px auto;padding:0 20px;display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--text2)}
.breadcrumb a{color:var(--text2);cursor:pointer;transition:color .2s}.breadcrumb a:hover{color:var(--primary)}
.breadcrumb i{font-size:.6rem}
.main{max-width:1300px;margin:0 auto;padding:0 20px 60px;display:grid;grid-template-columns:1fr 1fr;gap:40px}
.gallery{display:flex;flex-direction:column;gap:12px}
.main-img{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
.main-img img{max-width:80%;max-height:80%;object-fit:contain;transition:transform .3s}
.main-img img:hover{transform:scale(1.05)}
.thumbs{display:flex;gap:8px}
.thumb{background:var(--card);border:2px solid var(--border);border-radius:8px;width:70px;height:70px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:border-color .2s;flex-shrink:0}
.thumb img{max-width:80%;max-height:80%;object-fit:contain}
.thumb.active,.thumb:hover{border-color:var(--primary)}
.product-info{display:flex;flex-direction:column;gap:16px}
.prod-brand{font-size:0.8rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px}
.prod-name{font-size:1.8rem;font-weight:800;line-height:1.2}
.rating-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.stars{display:flex;gap:3px}.stars i{color:#ffaa00;font-size:0.85rem}.stars i.empty{color:var(--border)}
.rating-num{font-weight:700}.rating-count{color:var(--text2);font-size:0.85rem}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:5px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;display:flex;align-items:center;gap:5px}
.badge.green{background:rgba(0,200,83,0.15);color:#00c853}
.badge.orange{background:rgba(255,102,0,0.15);color:var(--primary)}
.badge.gray{background:var(--bg3);color:var(--text2)}
.price-section{display:flex;align-items:center;gap:14px}
.big-price{font-size:2.2rem;font-weight:800;color:var(--primary)}
.original-price{font-size:1.1rem;color:var(--text2);text-decoration:line-through}
.desc-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.desc-box h3{font-size:0.85rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.desc-box p{font-size:0.9rem;color:var(--text2);line-height:1.6}
.qty-section{display:flex;align-items:center;gap:14px}
.qty-label{font-weight:600;font-size:0.9rem}
.qty-ctrl{display:flex;align-items:center;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.qty-ctrl button{background:var(--bg3);color:var(--text);border:none;width:38px;height:38px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.qty-ctrl button:hover{background:var(--primary);color:#fff}
.qty-ctrl span{width:44px;text-align:center;font-weight:800;font-size:1rem;background:var(--bg4);height:38px;display:flex;align-items:center;justify-content:center}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-add{background:var(--primary);color:#fff;border:none;padding:14px;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-add:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-add:disabled{background:var(--bg4);color:var(--text2);cursor:not-allowed;transform:none}
.btn-buy{background:transparent;color:var(--primary);border:2px solid var(--primary);padding:14px;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-buy:hover{background:var(--primary);color:#fff;transform:translateY(-1px)}
.spec-table{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.spec-table h3{padding:14px 18px;font-size:0.95rem;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.spec-row{display:flex;border-bottom:1px solid var(--border)}
.spec-row:last-child{border-bottom:none}
.spec-key{width:45%;padding:11px 18px;font-size:0.85rem;color:var(--text2);font-weight:500;background:var(--bg3)}
.spec-val{flex:1;padding:11px 18px;font-size:0.85rem;font-weight:600}
.similar-section{max-width:1300px;margin:0 auto;padding:0 20px 60px}
.similar-section h2{font-size:1.3rem;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s}
.product-card:hover{border-color:var(--primary);transform:translateY(-3px)}
.product-card .img{aspect-ratio:1;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.product-card .img img{max-width:75%;max-height:75%;object-fit:contain}
.product-card .info{padding:12px}
.product-card .brand{font-size:0.7rem;color:var(--primary);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.product-card .name{font-size:0.83rem;font-weight:700;margin-bottom:5px}
.product-card .price{font-size:0.95rem;font-weight:800;color:var(--primary)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--primary);border-radius:12px;padding:14px 18px;z-index:9999;transform:translateX(120%);transition:transform .4s cubic-bezier(.68,-.55,.265,1.55);max-width:300px}
.toast.show{transform:translateX(0)}
.toast-title{font-weight:700;font-size:0.9rem;margin-bottom:3px}
.toast-msg{font-size:0.8rem;color:var(--text2)}
#productPage{display:contents}
@media(max-width:768px){.main{grid-template-columns:1fr}.action-btns{grid-template-columns:1fr}}
</style>
</head>

  document.getElementById('breadProduct').textContent=p.name;
  updateCartUI();
  const stars=[...Array(5)].map((_,i)=>i<Math.floor(p.rating)?'<i class="fas fa-star" style="color:#ffaa00"></i>':i-p.rating<0.5&&i-p.rating>-0.5?'<i class="fas fa-star-half-alt" style="color:#ffaa00"></i>':'<i class="far fa-star empty"></i>').join('');
  const specs=Object.entries(p.specs).map(([k,v])=>`<div class="spec-row"><div class="spec-key">${k}</div><div class="spec-val">${v}</div></div>`).join('');
  document.getElementById('productPage').innerHTML=`
    <div class="gallery">
      <div class="main-img"><img src="${p.image}" id="mainImg" alt="${p.name}"></div>
      <div class="thumbs">
        ${[p.image,p.image,p.image,p.image].map((img,i)=>`<div class="thumb${i===0?' active':''}" onclick="selectImg(this,'${img}')"><img src="${img}" alt="Ko'rinish ${i+1}"></div>`).join('')}
      </div>
    </div>
    <div class="product-info">
      <div class="prod-brand">${p.brand}</div>
      <h1 class="prod-name">${p.name}</h1>
      <div class="rating-row">
        <div class="stars">${stars}</div>
        <span class="rating-num">${p.rating}/5</span>
        <span class="rating-count">(${Math.floor(Math.random()*500)+50} sharh)</span>
      </div>
      <div class="badges">
        ${p.stock>0?`<span class="badge green"><i class="fas fa-check-circle"></i>${p.stock<5?'Faqat '+p.stock+' dona qoldi':'Mavjud — '+p.stock+' dona'}</span>`:`<span class="badge gray"><i class="fas fa-times-circle"></i>Tugagan</span>`}
        <span class="badge orange"><i class="fas fa-truck"></i>Bepul yetkazish</span>
        <span class="badge gray"><i class="fas fa-shield-alt"></i>2 yil kafolat</span>
      </div>
      <div class="price-section">
        <span class="big-price" id="priceDisplay">${fmt(p.price)}</span>
        <span class="original-price">${fmt(p.price*1.15)}</span>
      </div>
      <div class="desc-box">
        <h3>Tavsif</h3>
        <p>${p.description}</p>
      </div>
      <div class="qty-section">
        <span class="qty-label">Miqdor:</span>
        <div class="qty-ctrl">
          <button onclick="changeQty(-1)">−</button>
          <span id="qtyNum">1</span>
          <button onclick="changeQty(1)">+</button>
        </div>
        <span style="color:var(--text2);font-size:0.85rem">${p.stock} dona mavjud</span>
      </div>
      <div class="action-btns">
        <button class="btn-add" id="btnAdd" ${p.stock===0?'disabled':''} onclick="addToCart(${p.id},selectedQty)">
          <i class="fas fa-cart-plus"></i> Savatga qo'shish
        </button>
        <button class="btn-buy" onclick="buyNow(${p.id})">
          <i class="fas fa-bolt"></i> Hozir sotib ol
        </button>
      </div>
      <div class="spec-table">
        <h3><i class="fas fa-list" style="color:var(--primary);margin-right:8px"></i>Texnik xususiyatlar</h3>
        ${specs}
      </div>
    </div>`;
  const similar=PRODUCTS.filter(x=>x.category===p.category&&x.id!==p.id).slice(0,8);
  document.getElementById('similarGrid').innerHTML=similar.map(s=>`<div class="product-card" onclick="location.href='product.html?id=${s.id}'">
    <div class="img"><img src="${s.image}" alt="${s.name}" loading="lazy"></div>
    <div class="info">
      <div class="brand">${s.brand}</div>
      <div class="name">${s.name}</div>
      <div class="price">${fmt(s.price)}</div>
    </div>
  </div>`).join('');
}
function selectImg(el,src){
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mainImg').src=src;
}
function buyNow(id){addToCart(id,selectedQty);setTimeout(()=>location.href='cart.html',500);}
function showToast(title,msg){
  const t=document.getElementById('toast');
  t.innerHTML=`<div class="toast-title">${title}</div><div class="toast-msg">${msg}</div>`;
  t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}
renderPage();
</script>
</body>
</html>
